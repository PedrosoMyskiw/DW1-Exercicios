<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="IMC.css">
</head>

<body>

<header>
    <h2>Calculadora de IMC</h2>
</header>

<main>

    <section class="card">
        <h1>Calculadora IMC</h1>

        <label for="inputPeso">Peso:</label>
        <input type="number" id="inputPeso">

        <label for="inputAltura">Altura (m):</label>
        <input type="number" id="inputAltura" step="0.01">

        <button onclick="Calcular()">Calcular</button>

        <p id="erro"></p>
        <h3 id="resposta">...</h3>
    </section>

    <section class="card">
        <h2>Tabela de IMC</h2>

        <table>
            <tr>
                <th>IMC</th>
                <th>Classificação</th>
            </tr>
            <tr>
                <td>Menor que 18.5</td>
                <td>Abaixo do peso</td>
            </tr>
            <tr>
                <td>18.5 – 24.9</td>
                <td>Peso normal</td>
            </tr>
            <tr>
                <td>25.0 – 29.9</td>
                <td>Sobrepeso</td>
            </tr>
            <tr>
                <td>30.0 – 34.9</td>
                <td>Obesidade grau I</td>
            </tr>
            <tr>
                <td>35.0 – 39.9</td>
                <td>Obesidade grau II</td>
            </tr>
            <tr>
                <td>40.0 ou mais</td>
                <td>Obesidade grau III</td>
            </tr>
        </table>
    </section>

</main>

<footer>
    <span>Preencha os valores e calcule</span>
</footer>

<script src="IMC.js"></script>

</body>
</html>
